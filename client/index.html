<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore House Price Prediction</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🏠 Bangalore House Price Prediction</h1>
        <p>Estimate your property's market value using Machine Learning</p>
    </div>


    <div class="card">

        <label for="location">Location</label>
        <select id="location">
            <option value="">Select Location</option>
        </select>


        <label for="area">Total Area (sq ft)</label>
        <input 
            type="number" 
            id="area"
            placeholder="Enter area in sq ft"
        >


        <label for="bhk">BHK</label>
        <select id="bhk">
            <option value="1">1 BHK</option>
            <option value="2">2 BHK</option>
            <option value="3">3 BHK</option>
            <option value="4">4 BHK</option>
            <option value="5">5 BHK</option>
        </select>


        <label for="bath">Bathrooms</label>
        <select id="bath">
            <option value="1">1 Bathroom</option>
            <option value="2">2 Bathrooms</option>
            <option value="3">3 Bathrooms</option>
            <option value="4">4 Bathrooms</option>
            <option value="5">5 Bathrooms</option>
        </select>


        <button onclick="predictPrice()">
            Predict Price
        </button>


        <div id="result" class="result">
            Estimated Price will appear here
        </div>


    </div>

</div>


<script src="script.js"></script>

</body>
</html>
